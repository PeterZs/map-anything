# String for model factory
model_str: "vggt_omega"
# Model config
model_config:
  name: "vggt_omega"
  # Checkpoint path
  checkpoint_path: "${root_pretrained_checkpoints_dir}/vggt_omega_1b_512.pt"
# Image Normalization Type
data_norm_type: "identity"
# VGGT-Omega checkpoint is already loaded in the inference wrapper
pretrained: null
# Torch hub force reload
torch_hub_force_reload: false
